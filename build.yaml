# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  - board: nice_nano/nrf52840/zmk
    shield: cornix_dongle_adapter cornix_dongle_eyelash dongle_display
    snippet: nrf52840-nosd
    artifact-name: cornix_dongle_nosd
  # dongle screen not yet supports zephyr4
  # - board: seeeduino_xiao_ble
  #   shield: cornix_dongle_adapter dongle_screen
  #   snippet: studio-rpc-usb-uart
  #   artifact-name: cornix_dongle_zds_see
  # - board: nice_nano
  #   shield: cornix_dongle_adapter dongle_screen
  #   snippet: studio-rpc-usb-uart
  #   artifact-name: cornix_dongle_zds_nano
  - board: cornix_left
    shield: cornix_indicator
    artifact-name: cornix_left_central_usb_ble_nosd

  - board: cornix_ph_left
    shield: cornix_indicator
    artifact-name: cornix_left_dongle_peripheral_nosd

  - board: cornix_right
    shield: cornix_indicator
    artifact-name: cornix_right_peripheral_nosd

  - board: cornix_left
    shield: settings_reset
    snippet: nrf52840-nosd
    artifact-name: cornix_left_settings_reset

  - board: cornix_right
    shield: settings_reset
    snippet: nrf52840-nosd
    artifact-name: cornix_right_settings_reset

  - board: nice_nano/nrf52840/zmk
    shield: settings_reset
    snippet: nrf52840-nosd
    artifact-name: reset_nicenano_nosd
